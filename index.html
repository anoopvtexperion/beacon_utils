<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beacon Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h1 { font-size: 1.4rem; font-weight: 700; color: #111; margin-bottom: 6px; }
    p  { font-size: 0.9rem; color: #888; margin-bottom: 36px; }

    .links { display: flex; flex-direction: column; gap: 14px; }

    a.tool {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid #e5e7eb;
      transition: box-shadow 0.15s, border-color 0.15s;
      text-align: left;
    }

    a.tool:hover { border-color: #4f46e5; box-shadow: 0 2px 12px rgba(79,70,229,0.12); }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .icon-purple { background: #eef2ff; }
    .icon-green  { background: #ecfdf5; }
    .icon-blue   { background: #eff6ff; }

    .tool-info .name { font-size: 0.95rem; font-weight: 600; color: #111; }
    .tool-info .desc { font-size: 0.78rem; color: #888; margin-top: 2px; }
  </style>
</head>
<body>
<div class="card">
  <h1>Beacon Tools</h1>
  <p>iBKS Plus configuration and validation</p>

  <div class="links">
    <a class="tool" href="/provision">
      <div class="icon icon-green">&#x2699;&#xFE0F;</div>
      <div class="tool-info">
        <div class="name">Provisioner</div>
        <div class="desc">Connect to beacon, write ECDH key, get identity key + SQL</div>
      </div>
    </a>

    <a class="tool" href="/read-eid">
      <div class="icon icon-blue">&#x1F4E1;</div>
      <div class="tool-info">
        <div class="name">Read EID</div>
        <div class="desc">Scan advertisement, read live EID broadcast from beacon</div>
      </div>
    </a>

    <a class="tool" href="/validate">
      <div class="icon icon-purple">&#x1F50D;</div>
      <div class="tool-info">
        <div class="name">EID Validator</div>
        <div class="desc">Verify EID reading against key and base time</div>
      </div>
    </a>
  </div>
</div>
</body>
</html>
